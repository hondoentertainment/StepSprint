name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  server-test-postgres:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-ci-stepsprint-minimum-32-chars
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stepsprint?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stepsprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stepsprint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Generate Prisma client and sync schema
        working-directory: server
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Seed database
        working-directory: server
        run: npx prisma db seed

      - name: Run server tests (Postgres)
        working-directory: server
        run: npm run test:run

  client-test:
    runs-on: ubuntu-latest
    env:
      # Same-origin Vercel: SPA defaults to relative /api at runtime. Set
      # VITE_API_URL only if you intentionally split the API onto a different
      # hostname (e.g. legacy fallback).
      VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run client tests
        working-directory: client
        run: npm run test:run

      - name: Build client (matches Vercel build env)
        working-directory: client
        run: npm run build

  e2e:
    needs: [server-test-postgres, client-test]
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-ci-stepsprint-minimum-32-chars
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stepsprint?schema=public
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stepsprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stepsprint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Server install, migrate, seed
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npx prisma db push --accept-data-loss
          npx prisma db seed

      - name: Client install and Playwright (Chromium)
        working-directory: client
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright E2E (desktop Chrome)
        working-directory: client
        env:
          JWT_SECRET: test-jwt-secret-ci-stepsprint-minimum-32-chars
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stepsprint?schema=public
        run: npx playwright test --project=desktop-chrome --retries=0 --max-failures=6

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            client/test-results
            client/playwright-report
          retention-days: 3
          if-no-files-found: ignore

  smoke-test:
    needs: [server-test-postgres, client-test]
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-ci-stepsprint-minimum-32-chars
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stepsprint?schema=public
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stepsprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stepsprint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Sync database schema
        working-directory: server
        run: |
          npx prisma db push --accept-data-loss

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client (smoke path for Vercel dist layout)
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Start server and verify health
        shell: bash
        run: |
          set -euo pipefail
          cd server
          node dist/index.js &
          SERVER_PID=$!
          cd "${GITHUB_WORKSPACE}"
          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3001/api/health" >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [[ "$ready" -ne 1 ]]; then
            kill "$SERVER_PID" 2>/dev/null || true
            echo "Server failed to become healthy within 30 seconds"
            exit 1
          fi
          node scripts/check-api-health.mjs "http://127.0.0.1:3001"
          kill "$SERVER_PID"
          wait "$SERVER_PID" 2>/dev/null || true
      - name: Verify Vercel output path
        run: |
          test -f client/dist/index.html
          test -d client/dist/assets
