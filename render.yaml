# StepSprint Render blueprint.
# Deploy: render.com → New → Blueprint → select this repo.
# Provisions stepsprint-api (Docker web service) + stepsprint-db (Postgres 16).
# All required env vars are pre-filled below; only SENTRY_DSN and the four
# OAuth vars need manual values — leave them blank to deploy without them.

databases:
  - name: stepsprint-db
    plan: free
    databaseName: stepsprint
    postgresMajorVersion: "16"

services:
  - type: web
    name: stepsprint-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: stepsprint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # The Vercel client URL — used for CORS and OAuth redirect validation.
      # Update this value if you use a custom domain on Vercel.
      - key: APP_ORIGIN
        value: https://step-sprint.vercel.app
      - key: SENTRY_DSN
        sync: false
      # OAuth integrations (optional — server starts and runs without these).
      # Register apps in each provider's developer console, then paste the values here.
      # Fitbit redirect URI:     https://stepsprint-api.onrender.com/api/integrations/fitbit/callback
      # Google Fit redirect URI: https://stepsprint-api.onrender.com/api/integrations/google-fit/callback
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
