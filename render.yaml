# StepSprint Render blueprint.
# Deploy: render.com → New → Blueprint → select this repo.
# Provisions stepsprint-api (Docker web service) + stepsprint-db (Postgres 16).
#
# dockerfilePath is relative to the REPO ROOT (Render blueprint spec): use ./server/Dockerfile
# with dockerContext ./server so the image in server/Dockerfile is built. The image runs
# migrations, idempotent admin seed (dist/seed.js), then the API — see server/Dockerfile CMD.
#
# Required manual steps after first deploy:
#   1. Set RESEND_API_KEY  (get from resend.com — required for email verification)
#   2. Set SMTP_FROM       (e.g. "StepSprint <noreply@yourdomain.com>")
#   3. Optionally set SENTRY_DSN, VAPID_*, OAuth vars, OPENAPI_DOCS_ENABLED (Swagger in prod; default off)

databases:
  - name: stepsprint-db
    plan: starter
    databaseName: stepsprint
    postgresMajorVersion: "16"

services:
  - type: web
    name: stepsprint-api
    runtime: docker
    plan: starter
    region: oregon
    # Paths are relative to the repository root (see Render blueprint spec).
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: stepsprint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # The Vercel client URL — used for CORS and SPA redirects after OAuth.
      # Update this value if you use a custom domain on Vercel.
      - key: APP_ORIGIN
        value: https://step-sprint.vercel.app
      # Public URL of this API — OAuth callback host and Apple Health Shortcuts POST base.
      # Vercel: set VITE_API_URL at build time to this same origin (no trailing slash). Update vercel.json CSP connect-src if the hostname changes.
      - key: API_PUBLIC_ORIGIN
        value: https://stepsprint-api.onrender.com
      # Email (transactional — required for password reset and email verification).
      # Set RESEND_API_KEY to your Resend API key (resend.com).
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
      # Push notifications (optional — generate with: npx web-push generate-vapid-keys)
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      # Observability (optional)
      - key: SENTRY_DSN
        sync: false
      # Optional: overrides auto-derived release from git (see docs/PRODUCTION.md)
      - key: SENTRY_RELEASE
        sync: false
      # Startup in production requires RESEND_API_KEY or SMTP_HOST unless ALLOW_PRODUCTION_WITHOUT_EMAIL=true (escape hatch only).
      # OAuth integrations (optional — API runs without Fitbit/Google/Garmin credentials).
      # Register apps in each provider's developer console, then paste the values here.
      # Fitbit redirect URI:     https://stepsprint-api.onrender.com/api/integrations/fitbit/callback
      # Google Fit redirect URI: https://stepsprint-api.onrender.com/api/integrations/google-fit/callback
      # Garmin redirect URI:    https://stepsprint-api.onrender.com/api/integrations/garmin/callback
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GARMIN_CLIENT_ID
        sync: false
      - key: GARMIN_CLIENT_SECRET
        sync: false
      # Optional Garmin authorize scope when your Garmin app registration requires it.
      # - key: GARMIN_OAUTH_SCOPE
      #   sync: false
      # Optional (multi-instance): REMINDER_USE_EXTERNAL_CRON=true + REMINDER_CRON_SECRET (min 16 chars).
      # Schedule hourly POST to /api/cron/reminder-sweep with Authorization: Bearer <secret>.
      # Optional CORS: APP_ORIGIN_ALLOWLIST="https://www.example.com" (comma-separated SPA origins).
      # Staging-only previews: APP_ALLOW_VERCEL_PREVIEW_ORIGINS=true (allows https://*.vercel.app — do not use on prod).
      # Never set VITEST on the server — it is test-only and would weaken production env validation.
